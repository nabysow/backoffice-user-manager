trigger:
  branches:
    include:
    - main

pool:
  vmImage: ubuntu-latest

variables:
  containerRegistry: 'your-registry.azurecr.io'
  imageName: 'backoffice-user-manager'
  
stages:
- stage: Build
  displayName: 'Build and Test'
  jobs:
  - job: BuildAndTest
    displayName: 'Build and Test Job'
    steps:
    - task: UsePythonVersion@0
      inputs:
        versionSpec: '3.9'
      displayName: 'Use Python 3.9'
    
    - script: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov
      displayName: 'Install dependencies'
    
    - script: |
        python -m pytest tests/ --cov=src --cov-report=xml --cov-report=html
      displayName: 'Run tests with coverage'
    
    - task: PublishTestResults@2
      inputs:
        testResultsFiles: '**/test-*.xml'
        testRunTitle: 'Python Tests'
      displayName: 'Publish test results'
    
    - task: PublishCodeCoverageResults@1
      inputs:
        codeCoverageTool: 'Cobertura'
        summaryFileLocation: '**/coverage.xml'
        reportDirectory: '**/htmlcov'
      displayName: 'Publish code coverage'
    
    - task: Docker@2
      displayName: 'Build Docker image'
      inputs:
        command: 'build'
        repository: $(imageName)
        dockerfile: 'deployment/Dockerfile'
        tags: |
          $(Build.BuildId)
          latest
    
    - task: Docker@2
      displayName: 'Push Docker image'
      inputs:
        command: 'push'
        repository: $(imageName)
        containerRegistry: $(containerRegistry)
        tags: |
          $(Build.BuildId)
          latest
      condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))

- stage: Deploy
  displayName: 'Deploy to Azure'
  dependsOn: Build
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:
  - deployment: DeployToAzure
    displayName: 'Deploy to Azure Container Instance'
    environment: 'production'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureCLI@2
            displayName: 'Deploy to Azure Container Instance'
            inputs:
              azureSubscription: 'your-service-connection'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az container create \
                  --resource-group $(resourceGroupName) \
                  --name backoffice-user-manager \
                  --image $(containerRegistry)/$(imageName):$(Build.BuildId) \
                  --registry-login-server $(containerRegistry) \
                  --registry-username $(containerRegistryUsername) \
                  --registry-password $(containerRegistryPassword) \
                  --dns-name-label backoffice-user-manager \
                  --ports 8501 \
                  --environment-variables \
                    KEYVAULT_URL=$(keyvaultUrl) \
                    USERS_SECRET_NAME=$(usersSecretName) \
                    AZURE_CLIENT_ID=$(azureClientId) \
                    AZURE_TENANT_ID=$(azureTenantId) \
                  --assign-identity \
                  --location eastus \
                  --cpu 1 \
                  --memory 2
          
          - task: AzureCLI@2
            displayName: 'Check deployment status'
            inputs:
              azureSubscription: 'your-service-connection'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az container show \
                  --resource-group $(resourceGroupName) \
                  --name backoffice-user-manager \
                  --query instanceView.state \
                  --out tsv