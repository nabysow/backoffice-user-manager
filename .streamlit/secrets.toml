# Streamlit secrets configuration
# Copy this file to .streamlit/secrets.toml and fill in your actual values
# DO NOT commit this file to version control with real secrets

[azure]
# Azure Key Vault configuration
keyvault_url = "https://your-keyvault.vault.azure.net/"
users_secret_name = "backoffice-users-csv"

# Azure AD configuration
tenant_id = "your-tenant-id"
client_id = "your-app-registration-id"

# Optional: Azure Log Analytics
log_analytics_workspace_id = "your-workspace-id"

[app]
# Application configuration
admin_users = ["admin@company.com", "hr@company.com"]
default_role = "Viewer"
session_timeout = 3600

[development]
# Development settings
debug_mode = true
sample_data = true